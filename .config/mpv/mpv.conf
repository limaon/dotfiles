###########
# General #
###########

hwdec=auto
input-media-keys=yes
prefetch-playlist=yes
no-keepaspect-window                    # Disable float mode in qtile window manage
player-operation-mode=pseudo-gui

#Fiters
interpolation=no
deinterlace=no
dither-depth=auto
deband=no
deband-iterations=2
deband-threshold=64
deband-range=17
deband-grain=12

# Screenshot settings
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-tag-colorspace=yes
screenshot-png-compression=3
screenshot-jpeg-quality=95
screenshot-directory="~/Pictures/"
screenshot-template="%f-%wH.%wM.%wS.%wT-#%#00n"

######
# UI #
######

border=yes                                # hide the window title bar
msg-color=yes                             # color log messages on terminal
msg-module=yes                            # prepend module name to log messages
term-osd-bar=yes                          # display a progress bar on the terminal
keep-open                                 # keep the player open when a file's end is reached
force-window=immediate
cursor-autohide-fs-only                   # don't autohide the cursor in window mode, only fullscreen
cursor-autohide=1000                      # autohide the curser after 1s
geometry=50%

#############
# OSD / OSC #
#############

# Disable if using libmpv
title=${media-title} [${time-pos}${!duration==0: / ${duration}}] • ${mpv-version}
osd-level=1                               # enable osd and display --osd-status-msg on interaction
osd-duration=2500                         # hide the osd after x ms
osd-status-msg='${time-pos} / ${duration}${?percent-pos:　(${percent-pos}%)}${?frame-drop-count:${!frame-drop-count==0:　Dropped: ${frame-drop-count}}}\n${?chapter:Chapter: ${chapter}}'
osd-font='Liberation Sans'
osd-font-size=32
osd-color='#CCFFFFFF'                     # ARGB format
osd-border-color='#DD322640'              # ARGB format
osd-shadow-offset=1                       # pixel width for osd text and progress bar
osd-bar-align-y=0                         # progress bar y alignment (-1 top, 0 centered, 1 bottom)
osd-border-size=2                         # size for osd text and progress bar
osd-bar-h=2                               # height of osd bar as a fractional percentage of your screen height
osd-bar-w=60                              # width of " " "
osc=no
osd-bar=yes

##############
# Colorspace #
##############

icc-profile-auto
target-prim=auto
target-trc=auto
vf=format=colorlevels=full:colormatrix=auto
video-output-levels=full
hdr-compute-peak=auto
tone-mapping=mobius

##################
# audio settings #
##################

audio-file-auto=fuzzy                     # external audio doesn't has to match the file name exactly to autoload
audio-pitch-correction=yes                # automatically insert scaletempo when playing with higher speed
volume-max=100                            # maximum volume in %, everything above 100 results in amplification
volume=100                                # default volume, 100 = unchanged
af-add='dynaudnorm=g=5:f=250:r=0.9:p=0.5' # normalizes audio

#############
# Languages #
#############

slang=eng,en,pt,jp,jpn,ja         # automatically select these subtitles (decreasing priority)
slang=eng,en,pt,jp,jpn,ja         # automatically select these subtitles (decreasing priority)
alang=eng,en,pt,jp,jpn,ja         # automatically select these audio tracks (decreasing priority)

#############
# Subtitles #
#############

blend-subtitles=yes
demuxer-mkv-subtitle-preroll=yes          # try to show embedded subs when seeking even when no index information is present
demuxer-mkv-subtitle-preroll-secs=2

# Auto subtitle file pathing
sub-auto=fuzzy
sub-file-paths-append=ass
sub-file-paths-append=srt
sub-file-paths-append=pgs
sub-file-paths-append=vob
sub-file-paths-append=sub
sub-file-paths-append=sup
sub-file-paths-append=subs
sub-file-paths-append=subtitles

# ytdl-raw-options=ignore-config=,sub-format=en,write-sub=
# ytdl-raw-options=username=user,password=pass
# ytdl-format='bestvideo[format_id!*=hardsub]+bestaudio[format_id!*=hardsub]'
ytdl-raw-options=sub-lang="pt-BR,en-orig,en,pt,ja",write-sub=,write-auto-sub=,ignore-errors=
ytdl-format=bestvideo[height<=?480][fps<=?60][vcodec!=?webm]+bestaudio/best
osd-fractions

sub-ass
sub-ass-override=yes                       # load all SSA/ASS styles found in the specified file
embeddedfonts=yes                          # use embedded fonts for SSA/ASS subs
sub-fix-timing=yes                          # do not try to fix gaps (which might make it worse in some cases)
sub-ass-force-style=Kerning=yes            # allows you to override style parameters of ASS scripts
sub-use-margins
sub-ass-force-margins
sub-forced-only=auto                       # only load subtitles with force flag
sub-font="Liberation Sans"
sub-font-size=38
sub-color="#FFFF00"
#sub-border-color="#FF262626"
#sub-border-size=3.2
#sub-shadow-offset=1
#sub-shadow-color="#33000000"
sub-spacing=0.9

###################################
# Protocol Specific Configuration #
###################################

[protocol.file]
network-timeout=0
force-window=yes
cache=yes
demuxer-max-bytes=300M
demuxer-max-back-bytes=100M
demuxer-readahead-secs=300
force-seekable=yes

[protocol-network]
network-timeout=5
force-window=immediate
hls-bitrate=max
cache=yes
demuxer-max-bytes=300M
demuxer-readahead-secs=300

[protocol.http]
hls-bitrate=max                           # use max quality for HLS streams
cache=yes
no-cache-pause                            # don't pause when the cache runs low
user-agent='Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:95.0) Gecko/20100101 Firefox/95.0'

[protocol.https]
profile=protocol.http

[protocol.ytdl]
profile=protocol.http

##################
# other settings #
##################

# Use a large seekable RAM cache even for local input.
#cache=yes

# Use extra large RAM cache (needs cache=yes to make it useful).
#demuxer-max-bytes=41943040
#demuxer-max-back-bytes=41943040
cache-pause=no
cache-dir=~/.cache/
cache-on-disk=yes
