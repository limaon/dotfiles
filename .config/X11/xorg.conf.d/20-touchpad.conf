Section "InputClass"
        Identifier "system-touchpad"
        Driver "libinput"
        MatchIsTouchpad "on"
        Option "Tapping" "on"
        Option "TappingButtonMap" "lrm"
        Option "NaturalScrolling" "true"
        MatchDevicePath "/dev/input/event*"
        MatchProduct "06CB:CD41"
EndSection
