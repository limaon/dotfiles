# _+_+_+_+ General _+_+_+_+_
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

setw -q -g utf8 on
set -g focus-events on

# Open current directory
# bind o run-shell "thunar #{pane_current_path}"
# bind -r e kill-pane -a

# vim-like pane switching
bind -r k select-pane -U 
bind -r j select-pane -D 
bind -r h select-pane -L 
bind -r l select-pane -R 

# Resizing pane
bind -n C-Left resize-pane -L 2
bind -n C-Right resize-pane -R 2
bind -n C-Up resize-pane -U 2
bind -n C-Down resize-pane -D 2

# bind reload key
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"
set-option -g repeat-time 0
set-option -sg escape-time 0

# _+_+_+ Display _+_+_+
set -g set-titles on          # set terminal title
set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows
set-option -g automatic-rename on   # rename window to reflect current program
set-option -g automatic-rename-format '#{pane_current_command}'
set -g renumber-windows on    # renumber windows when a window is closed
set -g history-limit 1000	# boost history

# _+_+_+ Navigation _+_+_+
set-option -g mouse on		# Mouse integration
set -g status-keys vi		# Set vi as the default editor

# Open another pane in the same path
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -n M-v run "tmux set-buffer \"$(xclip -o -selection clipboard)\"; tmux paste-buffer"

################
# Status bar
################
set -g status on
set-option -g status-interval 2
set-option -g status-justify "left"
set -g status-left-length 85

set -g status-style "fg=#fdf6e3, bg=#859900"
set -g status-left '#[fg=#002b36,bg=#93a1a1,bold] [#S] #[fg=#93a1a1,bg=#859900,nobold]'

set -g window-status-separator '#[fg=colour252,bg=#859900,nobold]'
set -g window-status-format '#[fg=#859900,bg=color238,nobold]#[fg=color247,bg=color238]  #I  #[fg=color247,bg=color238]#W #[fg=color238,bg=#859900,nobold]'
set -g window-status-current-format '#[fg=#859900,bg=color23,nobold]#[fg=#eee8d5,bg=color23] #I  #[fg=colour231,bold]#W #[fg=color23,bg=#859900,nobold]'

# Show prefix status
set -g status-right-length 150
set -g status-right '#[fg=color161,bg=#859900,bold]#[fg=#eee8d5,bg=color161,bold]#{?client_prefix, דּ  ,}#[fg=color238]#[fg=#93a1a1,bg=color238]#[fg=#002b36,bg=#93a1a1]  indexPane:[#P] '

# Separator line pane
set -g pane-border-lines simple
set -g pane-border-style "fg=#93A1A1"
set -g pane-border-format "#{pane_index} #T"
