#: Theme
include solarized_dark_theme.conf

#: Fonts {{{
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.0
force_ltr        yes

#: }}}


#: Cursor customization {{{
shell_integration no-cursor
cursor_shape block
cursor_blink_interval -1
cursor_stop_blinking_after 15

#: }}}

#: Opacity {{{
background_opacity 0.96
dynamic_background_opacity yes
dim_opacity 0.95

#: }}}

#: Window config {{{
remember_window_size  yes
hide_window_decorations yes
draw_minimal_borders no
tab_bar_margin_width 0.0

window_resize_step_cells 2
window_resize_step_lines 2

window_border_width 0.0
window_margin_width 0.0

#: }}}

#: Native Tabs config {{{
tab_bar_edge top
tab_bar_margin_width 1.0
tab_bar_style powerline

#: }}}

#: Keyboard shortcuts {{{
clear_all_shortcuts yes
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map opt+k scroll_line_up
map opt+j scroll_line_down
map opt+u scroll_page_up
map opt+d scroll_page_down
map opt+shift+k change_font_size all +1.0
map opt+shift+j change_font_size all -1.0
map opt+shift+space change_font_size all 0
map opt+insert kitten unicode_input

#: }}}

strip_trailing_spaces smart
scrollback_lines 1500
enable_audio_bell no
select_by_word_characters :@-./_~?&=%+#
