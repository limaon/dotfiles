#===================== Shadows =========================#
shadow = false;
shadow-radius = 5;
shadow-opacity = 0;
shadow-offset-x = 0;
shadow-offset-y = 0;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "class_g = 'slop'",
    "class_g = 'Firefox' && argb",
    "class_g = 'Rofi'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

#========================= Fading =========================#
fading = false;
fade-in-step = 0.09;
fade-out-step = 0.09;
fade-delta = 3;
fade-exclude = [
    "class_g = 'slop'"
]
no-fading-openclose = false
no-fading-destroyed-argb = true

#=============== Transparency / Opacity ===================#
inactive-opacity = 0.94;
frame-opacity = 0.94;
inactive-opacity-override = false;
active-opacity = 1.0
inactive-dim = 0.0
focus-exclude = [ 
    "class_g = 'Cairo-clock'",
    "class_g = 'Bar'",
    "class_g = 'slop'",
    "class_g ?= 'rofi'",
    "class_g ?= 'Steam'",
];

opacity-rule = [
    "80:class_g = 'Bar'",
    "100:class_g = 'slop'",
    "100:class_g = 'Alacritty'",
    "100:class_g = 'firefox'",
    "100:class_g = 'dmenu'",
]

#===================== Corners =========================#
#corner-radius = 7
# rounded-corners-exclude = [
#   "window_type = 'dock'",
#   "window_type = 'desktop'"
# ];

#================== Background-Blurring =========================#
blur-background-exclude = [
    "window_type = 'dock'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c"
];

#===================== General Settings =========================#
daemon = false
backend = "glx"
vsync = true;
dbus = false
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
resize-damage = 1
glx-no-stencil = true;
use-damage = true;
show-all-xerrors = true;

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.98; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.98; shadow = false; }
  dropdown_menu = { opacity = 0.98; }
};
